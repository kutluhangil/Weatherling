<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Play feature graphic (1024x500 PNG'ye export et). Sol: wordmark + tagline.
       Sağ: yaratık sahnesi. Kritik metni kenarlardan uzak tut (Play bindirme yapabilir). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241f4a"/>
      <stop offset="0.6" stop-color="#3a2f63"/>
      <stop offset="1" stop-color="#e7a977"/>
    </linearGradient>
    <clipPath id="moonClip"><circle cx="792" cy="150" r="34"/></clipPath>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>
  <g fill="#ffffff" opacity="0.5">
    <circle cx="90" cy="80" r="2.6"/><circle cx="160" cy="130" r="1.6"/>
    <circle cx="60" cy="360" r="1.8"/><circle cx="600" cy="70" r="2.2"/>
    <circle cx="940" cy="90" r="1.8"/><circle cx="880" cy="300" r="1.5"/>
  </g>

  <!-- Wordmark -->
  <text x="90" y="240" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="92"
        font-weight="700" fill="#fdf3e3">Weatherling</text>
  <text x="92" y="296" font-family="Segoe UI, sans-serif" font-size="32" fill="#f0d9c4">
    Gerçek havanda yaşayan minik bir yoldaş
  </text>
  <text x="92" y="338" font-family="Segoe UI, sans-serif" font-size="26" fill="#cfc0e0">
    A tiny companion living in your real weather
  </text>

  <!-- Ay -->
  <g clip-path="url(#moonClip)">
    <circle cx="792" cy="150" r="34" fill="#ffe6ad"/>
    <circle cx="810" cy="136" r="32" fill="#241f4a" opacity="0.9"/>
  </g>

  <!-- Bulut + yağmur -->
  <g fill="#dde5f2">
    <circle cx="760" cy="210" r="34"/>
    <circle cx="800" cy="190" r="44"/>
    <circle cx="844" cy="212" r="32"/>
    <rect x="756" y="206" width="92" height="40" rx="20"/>
  </g>
  <g fill="#7fb4ff">
    <rect x="766" y="258" width="8" height="24" rx="4"/>
    <rect x="800" y="268" width="8" height="24" rx="4"/>
    <rect x="834" y="258" width="8" height="24" rx="4"/>
  </g>

  <!-- Yaratık -->
  <ellipse cx="800" cy="372" rx="92" ry="82" fill="#f4ead8"/>
  <ellipse cx="800" cy="372" rx="92" ry="82" fill="none" stroke="#d8c7a6" stroke-width="3.5"/>
  <path d="M800 296c-12-18-2-38 0-38 2 0 12 20 0 38z" fill="#8fd089"/>
  <circle cx="772" cy="366" r="9.5" fill="#3a3550"/>
  <circle cx="828" cy="366" r="9.5" fill="#3a3550"/>
  <circle cx="775" cy="362" r="3" fill="#ffffff"/>
  <circle cx="831" cy="362" r="3" fill="#ffffff"/>
  <circle cx="752" cy="388" r="10" fill="#f6b8c0" opacity="0.8"/>
  <circle cx="848" cy="388" r="10" fill="#f6b8c0" opacity="0.8"/>
  <path d="M786 392c8 9 18 9 28 0" fill="none" stroke="#3a3550" stroke-width="4.5" stroke-linecap="round"/>
</svg>
