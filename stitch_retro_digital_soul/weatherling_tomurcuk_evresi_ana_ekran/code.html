<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Pixel Art 9-Patch Simulation */
        .pixel-border-premium {
            border: 4px solid #E87C3E;
            box-shadow: 
                inset -4px -4px 0px 0px rgba(0,0,0,0.3),
                inset 4px 4px 0px 0px rgba(255,255,255,0.1);
            background: #2b1931;
        }

        .pixel-button-chunky {
            position: relative;
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 0 #480e76;
        }

        .pixel-button-chunky:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 0 #480e76;
        }

        /* Breathing Animation for Filiz */
        @keyframes breathe {
            0%, 100% { transform: scale(1, 1); }
            50% { transform: scale(1.05, 0.95); }
        }
        .animate-breathe {
            animation: breathe 3s ease-in-out infinite;
        }

        /* Pixel Rain Effect */
        .rain-drop {
            position: absolute;
            width: 2px;
            height: 6px;
            background: #FFC078;
            opacity: 0.6;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        /* Glass Shine for Bars */
        .bar-shine {
            background: linear-gradient(to bottom, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 40%);
        }

        /* Atmosphere Overlay */
        .dusk-overlay {
            background: linear-gradient(180deg, rgba(26, 15, 31, 0) 0%, rgba(59, 38, 87, 0.4) 100%);
            pointer-events: none;
        }
    </style>

<!-- Interactive Script for Weather & Micro-interactions -->
<script>
        // Rain Particle Generation
        const rainContainer = document.getElementById('rain-container');
        const rainCount = 60;

        function createRain() {
            for (let i = 0; i < rainCount; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 0.5 + 0.8) + 's';
                drop.style.animationDelay = Math.random() * 2 + 's';
                drop.style.opacity = Math.random() * 0.4 + 0.2;
                rainContainer.appendChild(drop);
            }
        }

        // Tap Ripples on Puddle Simulation
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'absolute border-2 border-horizon-glow/30 rounded-full animate-ping pointer-events-none';
            ripple.style.width = '40px';
            ripple.style.height = '10px';
            ripple.style.left = (e.clientX - 20) + 'px';
            ripple.style.top = (e.clientY - 5) + 'px';
            document.body.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 1000);
        });

        // Initialize
        createRain();

        // Small interaction: Feed button makes Filiz jump
        const feedBtn = document.querySelector('button:has(span:contains("Besle"))');
        const creature = document.querySelector('.animate-breathe');
        
        // Note: Generic selector fix for the specific demo
        document.querySelectorAll('.pixel-button-chunky').forEach(btn => {
            btn.addEventListener('click', () => {
                creature.style.animation = 'none';
                void creature.offsetWidth; // Trigger reflow
                creature.style.animation = 'breathe 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1';
                setTimeout(() => {
                    creature.style.animation = 'breathe 3s ease-in-out infinite';
                }, 500);
            });
        });
    </script>
