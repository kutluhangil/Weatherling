<!-- Micro-interaction Particles Script -->
<script>
        const container = document.body;
        const colors = ['#FFC078', '#E87C3E', '#F72585', '#4CC9F0'];

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            const startX = Math.random() * window.innerWidth;
            const startY = window.innerHeight + 10;
            
            particle.style.left = `${startX}px`;
            particle.style.top = `${startY}px`;
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            container.appendChild(particle);
            
            const destinationX = startX + (Math.random() - 0.5) * 200;
            const destinationY = -100;
            const duration = Math.random() * 5000 + 5000;
            
            particle.animate([
                { transform: `translate(0, 0)`, opacity: 0 },
                { transform: `translate(${(destinationX - startX) * 0.5}px, -400px)`, opacity: 0.6 },
                { transform: `translate(${destinationX - startX}px, ${destinationY - startY}px)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'linear'
            }).onfinish = () => particle.remove();
        }

        // Periodically create particles
        setInterval(createParticle, 400);

        // Interactive "Start" button sound simulation / visual feedback
        const btn = document.getElementById('nextBtn');
        btn.addEventListener('click', () => {
            // Flash effect on click
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 bg-white z-[100] pointer-events-none opacity-0';
            document.body.appendChild(flash);
            flash.animate([
                { opacity: 0.4 },
                { opacity: 0 }
            ], { duration: 300 }).onfinish = () => flash.remove();
            
            // Redirect simulation or further action could go here
            console.log("Starting adventure with name:", document.getElementById('creature_name').value);
        });
    </script>
