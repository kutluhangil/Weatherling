<style>

            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }

            animation: float 2s ease-in-out infinite;
        }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* 9-patch border decorative corners */
        .corner-decoration::before, .corner-decoration::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #E87C3E;
        }
        .corner-top-left::before { top: -4px; left: -4px; }
        .corner-top-right::after { top: -4px; right: -4px; }

<script>
        function triggerJuice(element) {
            // Visual squash/stretch micro-interaction
            element.style.transition = 'transform 0.05s ease-out';
            element.style.transform = 'scale(0.92) translateY(4px)';
            
            // Generate simple "particle" effect (using DOM for portability)
            const particle = document.createElement('div');
            particle.className = 'absolute inset-0 pointer-events-none rounded-xl border-2 border-horizon-glow opacity-0';
            element.appendChild(particle);
            
            setTimeout(() => {
                particle.style.transition = 'all 0.4s ease-out';
                particle.style.transform = 'scale(1.4)';
                particle.style.opacity = '0';
                element.style.transform = 'scale(1)';
                
                setTimeout(() => {
                    particle.remove();
                }, 400);
            }, 50);
        }

        // Handle generic tap on background to close
