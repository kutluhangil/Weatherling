<style>
        @keyframes drift {
            0% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-5px) translateX(2px); }
            100% { transform: translateY(0) translateX(0); }
        }
        @keyframes squash {
            0%, 100% { transform: scale(1, 1); }
            50% { transform: scale(1.05, 0.95); }
        }
        @keyframes rain {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(500%); opacity: 0; }
        }
        .pixel-rain {
            position: absolute;
            width: 2px;
            height: 10px;
            background: #4CC9F0;
            opacity: 0.4;
            pointer-events: none;
        }
        .nine-patch-border {
            border-image-source: linear-gradient(to bottom right, #FF9D5C, #E87C3E);
            border-image-slice: 16;
            border-width: 4px;
            border-style: solid;
        }
        .creature-float {
            animation: drift 4s ease-in-out infinite;
        }
        .status-shine::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 33%;
            background: rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }
        .dialogue-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 20px;
            border-width: 8px 8px 0 0;
            border-style: solid;
            border-color: #f6d9fa transparent transparent transparent;
        }
    </style>

<!-- Script for Dynamic Atmospheric Effects -->
<script>
        function createRain() {
            const container = document.getElementById('rain-container');
            const count = 30;
            for (let i = 0; i < count; i++) {
                const drop = document.createElement('div');
                drop.className = 'pixel-rain';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.top = '-' + (Math.random() * 100) + 'px';
                drop.style.animation = `rain ${0.5 + Math.random()}s linear infinite`;
                drop.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(drop);
            }
        }

        // Initialize rain
        createRain();

        // Simple tactile interaction feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.classList.add('squash-anim');
            });
            btn.addEventListener('touchend', () => {
                setTimeout(() => btn.classList.remove('squash-anim'), 100);
            });
        });
    </script>
