<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Hanken+Grotesk:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --pixel-size: 4px;
        }
        body {
            background-color: #1d0c24;
            overflow: hidden;
            user-select: none;
        }
        /* Custom 9-patch style for pixel-art panels */
        .pixel-border {
            border: 4px solid #E87C3E;
            box-shadow: inset -4px -4px 0px 0px #743500, inset 4px 4px 0px 0px #FFC078;
            background: #1A0F1F;
        }
        .pixel-node {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .pixel-node:active {
            transform: scale(0.9);
        }
        /* Connecting lines animation */
        .skill-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 2s ease-out forwards;
        }
        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }
        /* Floating dust particles */
        .dust {
            position: absolute;
            background: rgba(255, 192, 120, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
        }
        /* Parchment Texture Overlay */
        .parchment-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }
    </style>
<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#1d0c24",

                        "error": "#ffb4ab",

                        "secondary-container": "#622f91",

                        "deep-plum": "#1A0F1F",
                        "on-secondary-fixed-variant": "#602c8e",
                        "background": "#1d0c24",
                        "secondary-fixed-dim": "#deb7ff",
                        "on-secondary-fixed": "#2d0050",
                        "surface-variant": "#412e47",
                        "on-primary-fixed": "#321300",
                        "inverse-on-surface": "#3c2942",
                        "on-background": "#f6d9fa",
                        "surface-container-highest": "#412e47",
                        "horizon-glow": "#FFC078",
                        "primary-fixed": "#ffdbc8",
                        "tertiary-fixed-dim": "#edc157",
                        "surface-tint": "#ffb68a",
                        "status-energy": "#4CC9F0",
                        "status-love": "#F72585",
                        "on-surface-variant": "#dac2b4",
                        "on-tertiary-fixed": "#251a00",
                        "inverse-surface": "#f6d9fa",
                        "tertiary-fixed": "#ffdf9b",
                        "outline-variant": "#544339",
                        "primary-fixed-dim": "#ffb68a",
                        "on-primary-container": "#743500",
                        "on-tertiary-container": "#5a4300",
                        "secondary": "#deb7ff",
                        "primary-container": "#ff9d5c",
                        "on-error-container": "#ffdad6",
                        "twilight-indigo": "#3B2657",
                        "status-hunger": "#FF4D6D",
                        "on-secondary": "#480e76",
                        "outline": "#a28c80",
                        "inverse-primary": "#95490d",
                        "tertiary": "#f8ca60",
                        "on-surface": "#f6d9fa",
                        "on-tertiary": "#3f2e00",
                        "secondary-fixed": "#f1dbff",
                        "surface-bright": "#46324c",
                        "on-primary": "#522300",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",

                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "pixel-unit": "4px",
                        "gutter": "16px",
                        "margin-desktop": "32px",
                        "margin-mobile": "20px",
                        "container-padding": "12px",
                        "touch-target-min": "48px"
                    },
                    "fontFamily": {
                        "body-md": ["Hanken Grotesk"],

                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],

                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface-dim text-on-surface font-body-md">
<!-- Top App Bar -->
<header class="bg-deep-plum/80 backdrop-blur-sm fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-touch-target-min">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-horizon-glow">cloudy_snowing</span>
<h1 class="font-pixel-display text-pixel-display text-dusk-amber">Weatherling</h1>
</div>
<div class="flex items-center gap-4">
<div class="flex flex-col items-end">
<span class="font-label-sm text-label-sm text-primary">LVL 12</span>
<div class="w-24 h-2 bg-surface-container rounded-full overflow-hidden border border-outline-variant/30">
<div class="h-full bg-horizon-glow w-3/4 shadow-[0_0_8px_rgba(255,192,120,0.5)]"></div>
</div>
</div>
<div class="bg-surface-container-high px-3 py-1 rounded-xl flex items-center gap-2 border-b-2 border-r-2 border-deep-plum">

</div>

</header>
<!-- Background Canvas -->
<main class="relative w-full h-screen overflow-hidden pt-touch-target-min">
<div class="absolute inset-0 parchment-overlay"></div>
<!-- Atmospheric Background Animation -->

<!-- Skill Tree Container -->
<div class="relative w-full h-full flex items-center justify-center p-gutter">
<!-- SVG Connecting Branches -->
<svg class="absolute inset-0 w-full h-full pointer-events-none opacity-60" preserveaspectratio="xMidYMid slice" viewbox="0 0 400 800">
<defs>
<filter id="glow">
<fegaussianblur result="coloredBlur" stddeviation="2.5"></fegaussianblur>
<femerge>
<femergenode in="coloredBlur"></femergenode>
<femergenode in="SourceGraphic"></femergenode>
</femerge>
</filter>
</defs>
<!-- Central to Playfulness -->
<path class="skill-line" d="M 200,400 Q 150,300 120,220" fill="none" stroke="#E87C3E" stroke-linecap="round" stroke-width="4"></path>
<!-- Central to Resilience -->
<path class="skill-line" d="M 200,400 Q 250,320 280,250" fill="none" stroke="#E87C3E" stroke-linecap="round" stroke-width="4"></path>
<!-- Central to Music (Locked) -->
<path class="skill-line" d="M 200,400 Q 200,550 200,650" fill="none" stroke="#412e47" stroke-dasharray="8 8" stroke-width="4"></path>
<!-- Pixel Art Leaves Accents -->
<circle cx="120" cy="220" fill="#FFC078" filter="url(#glow)" r="6"></circle>
<circle cx="280" cy="250" fill="#FFC078" filter="url(#glow)" r="6"></circle>
</svg>
<!-- Skill Nodes -->
<div class="relative w-full h-full max-w-md mx-auto">
<!-- Central Node: Temel Bağ (Unlocked) -->
<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-20">
<div class="pixel-node group cursor-pointer flex flex-col items-center">
<div class="w-20 h-20 bg-primary-container rounded-xl flex items-center justify-center border-4 border-horizon-glow shadow-[0_0_20px_rgba(255,192,120,0.4)] relative">
<span class="material-symbols-outlined text-on-primary-container text-[40px]" style="font-variation-settings: 'FILL' 1;">favorite</span>
<!-- Shine effect -->
<div class="absolute top-1 left-1 w-2/3 h-1/3 bg-white/20 rounded-full blur-[1px]"></div>
</div>
<div class="mt-2 bg-deep-plum/90 px-3 py-1 rounded-lg border border-primary/30">
<span class="font-label-md text-label-md text-horizon-glow">Temel Bağ</span>
</div>
</div>
</div>
<!-- Branching: Oyunbazlık (Lvl 2) -->
<div class="absolute left-[15%] top-[18%] z-20">
<div class="pixel-node group cursor-pointer flex flex-col items-center">
<div class="w-16 h-16 bg-secondary-container rounded-xl flex items-center justify-center border-4 border-secondary shadow-[0_0_15px_rgba(222,183,255,0.3)]">
<span class="material-symbols-outlined text-on-secondary-container text-[32px]">sports_esports</span>
</div>
<div class="mt-2 bg-deep-plum/90 px-3 py-1 rounded-lg border border-secondary/30 text-center">
<span class="block font-label-md text-label-md text-secondary">Oyunbazlık</span>
<span class="block font-label-sm text-[10px] text-on-surface-variant">Lvl 2</span>
</div>
</div>
</div>
<!-- Branching: Dayanıklılık (Lvl 3) -->
<div class="absolute right-[15%] top-[22%] z-20">
<div class="pixel-node group cursor-pointer flex flex-col items-center">
<div class="w-16 h-16 bg-tertiary-container rounded-xl flex items-center justify-center border-4 border-tertiary shadow-[0_0_15px_rgba(248,202,96,0.3)]">
<span class="material-symbols-outlined text-on-tertiary-container text-[32px]">fitness_center</span>
</div>
<div class="mt-2 bg-deep-plum/90 px-3 py-1 rounded-lg border border-tertiary/30 text-center">
<span class="block font-label-md text-label-md text-tertiary">Dayanıklılık</span>
<span class="block font-label-sm text-[10px] text-on-surface-variant">Lvl 3</span>
</div>
</div>
</div>
<!-- Branching: Müzik Ruhun Gıdası (Locked) -->
<div class="absolute left-1/2 bottom-[15%] -translate-x-1/2 z-20">
<div class="pixel-node group cursor-not-allowed flex flex-col items-center opacity-70 grayscale-[0.5]">
<div class="w-16 h-16 bg-surface-container-highest rounded-xl flex items-center justify-center border-4 border-outline relative">
<span class="material-symbols-outlined text-on-surface-variant text-[32px]">music_note</span>
<div class="absolute inset-0 bg-deep-plum/40 flex items-center justify-center rounded-lg">
<span class="material-symbols-outlined text-white text-[20px]">lock</span>
</div>
</div>
<div class="mt-2 bg-deep-plum/90 px-3 py-1 rounded-lg border border-outline/30 text-center">
<span class="block font-label-md text-label-md text-on-surface-variant">Müzik Ruhun Gıdası</span>
<div class="flex items-center justify-center gap-1 mt-1">
<span class="material-symbols-outlined text-tertiary text-[14px]">payments</span>
<span class="font-label-sm text-label-sm text-tertiary">500</span>
</div>
</div>
</div>
</div>
</div>
</div>
</main>

<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-gutter py-2 pb-safe bg-surface-container border-t-4 border-primary-container shadow-lg shadow-primary/20">

<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-xl p-pixel-unit scale-110 border-b-2 border-r-2 border-on-secondary-container" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_tree</span>
<span class="font-label-sm text-label-sm">Play</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant p-pixel-unit opacity-80 hover:bg-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined">shopping_bag</span>
<span class="font-label-sm text-label-sm">Shop</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant p-pixel-unit opacity-80 hover:bg-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-sm text-label-sm">Settings</span>
</a>
</nav>
<!-- Particle Effect Layer -->
<div class="fixed inset-0 pointer-events-none z-10" id="dust-container"></div>
<script>
        // Create dust particles
        const container = document.getElementById('dust-container');
        for (let i = 0; i < 20; i++) {
            const dust = document.createElement('div');
            dust.className = 'dust';
            const size = Math.random() * 4 + 2 + 'px';
            dust.style.width = size;
            dust.style.height = size;
            dust.style.left = Math.random() * 100 + 'vw';
            dust.style.top = Math.random() * 100 + 'vh';
            dust.style.animationDelay = Math.random() * 20 + 's';
            dust.style.animationDuration = Math.random() * 10 + 15 + 's';
            container.appendChild(dust);
        }

        // Simple squash and stretch animation on node click
        document.querySelectorAll('.pixel-node').forEach(node => {
            node.addEventListener('mousedown', () => {
                node.style.transition = 'transform 0.05s';
                node.style.transform = 'scale(0.9, 1.1)';
            });
            node.addEventListener('mouseup', () => {
                node.style.transition = 'transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                node.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
