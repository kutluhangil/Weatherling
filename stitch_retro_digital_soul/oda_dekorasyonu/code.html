<!-- Interactive Script for micro-interactions -->
<script>
        // Simple scale effect on tap for all buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('touchend', () => {
                button.classList.remove('scale-95');
            });
        });

        // Toggle Active state simulation for categories
        const tabs = document.querySelectorAll('nav button');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    const iconBox = t.querySelector('div');
                    const label = t.querySelector('span:last-child');
                    iconBox.className = 'p-2 bg-surface-container-high rounded-xl';
                    label.className = 'text-label-sm font-label-sm text-on-surface-variant';
                    t.classList.add('opacity-60');
                });
                
                const activeIconBox = tab.querySelector('div');
                const activeLabel = tab.querySelector('span:last-child');
                activeIconBox.className = 'p-2 bg-secondary-container text-on-secondary-container rounded-xl border-b-2 border-r-2 border-on-secondary-container scale-110';
                activeLabel.className = 'text-label-sm font-label-sm text-on-tertiary-container';
                tab.classList.remove('opacity-60');
            });
        });
    </script>
